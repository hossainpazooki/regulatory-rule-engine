name: Rust CI

on:
  push:
    branches: [main, develop, "migration/**"]
  pull_request:
    branches: [main]

concurrency:
  group: rust-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: cargo clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: cargo test
    # Matrix both OSes: the schema-determinism / byte-exact gates are
    # checkout-environment-sensitive (autocrlf), so a Linux-only job can be
    # green while a fresh Windows clone is red. Run both so the gate is
    # platform-independent in CI, matching the .gitattributes eol=lf pin.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace --all-targets
      # Explicit feature list, NOT --all-features: `sql-views` (bundled DuckDB)
      # is deliberately excluded from this matrix — it is default-off and builds
      # only on the dedicated Linux `sql-views` job below. Letting --all-features
      # sweep it in would force a heavy bundled-DuckDB C++ build on the
      # windows-latest leg, against its design. `test-keys,pyo3` reproduces the
      # prior --all-features coverage minus sql-views; add new non-sql features
      # here explicitly.
      - run: cargo test --workspace --features test-keys,pyo3

  # Gate 5 (workstream 5b SQL views, G5-3): the `sql-views` feature pulls in
  # `duckdb` (bundled, via libduckdb-sys's cc-rs), which CANNOT build on the
  # local `x86_64-pc-windows-gnu` toolchain — no C++ compiler on PATH (the
  # DuckDB probe: `g++.exe` not found, EXITCODE=101). It is therefore default-off
  # and exercised on this dedicated Linux leg, where a C++ toolchain exists. This
  # is the only place `ke sql` / the SQL views are compiled + tested.
  sql-views:
    name: ke sql (DuckDB, Linux only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p ke-cli --features sql-views
